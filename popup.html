<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;max-height:500px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e6e6e6;overflow:hidden;display:flex;flex-direction:column}
.header{padding:12px 14px 8px;border-bottom:1px solid #222}
.header h1{font-size:14px;color:#fff;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.header h1 span{color:#888;font-size:11px;font-weight:400}
input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #333;background:#161616;color:#fff;font-size:13px;outline:none}
input:focus{border-color:#3b82f6}
.filters{display:flex;gap:4px;padding:8px 14px;overflow-x:auto;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.filters::-webkit-scrollbar{height:0}
.fbtn{padding:4px 8px;border-radius:6px;border:1px solid #333;background:#161616;color:#888;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600}
.fbtn.active{background:#1a2744;color:#4da6ff;border-color:#2a4a7a}
.fbtn:hover:not(.active){background:#1c1c1c}
.tools{flex:1;overflow-y:auto;padding:6px 0}
.tools::-webkit-scrollbar{width:6px}
.tools::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.tool{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;text-decoration:none;color:#e6e6e6;border-bottom:1px solid #111}
.tool:hover{background:#161616}
.tool .icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;background:#1a1a1a;border-radius:6px;flex-shrink:0}
.tool .info{flex:1;min-width:0}
.tool .info h3{font-size:12px;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool .info p{font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool .fav{color:#333;cursor:pointer;font-size:14px;flex-shrink:0;padding:2px}
.tool .fav.on{color:#f59e0b}
.tool .fav:hover{color:#f59e0b}
.empty{text-align:center;color:#555;padding:32px 14px;font-size:12px}
.footer{padding:6px 14px;border-top:1px solid #222;text-align:center;font-size:10px;color:#444;flex-shrink:0}
.footer a{color:#555;text-decoration:none}
.footer a:hover{color:#888}
.tabs{display:flex;border-bottom:1px solid #222}
.tab{flex:1;padding:6px;text-align:center;font-size:11px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#4da6ff;border-bottom-color:#3b82f6}
.tab:hover:not(.active){color:#999}
.badge{background:#3b82f6;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px}
</style>
</head>
<body>
<div class="header">
  <h1>Dev Toolkit <span id="count">440 tools</span></h1>
  <input type="text" id="search" placeholder="Search tools... (e.g. json, color, regex)" autofocus>
</div>
<div class="tabs">
  <div class="tab active" data-tab="all">All</div>
  <div class="tab" data-tab="favs">Favorites <span class="badge" id="favCount">0</span></div>
  <div class="tab" data-tab="recent">Recent</div>
</div>
<div class="filters" id="filters"></div>
<div class="tools" id="tools"></div>
<div class="footer">
  <a href="https://yurukusa.github.io/dev-toolkit/" target="_blank">Open full portal</a> ·
  <a href="https://ko-fi.com/yurukusa" target="_blank">Support</a>
</div>
<script src="tools.js"></script>
<script src="popup.js"></script>
</body>
</html>
